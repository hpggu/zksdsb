<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票系统 - 前后端对接版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            padding: 40px 30px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #3498db;
            font-size: 28px;
        }

        /* 提示框样式 */
        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: none;
            font-size: 15px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        /* 登录区域 */
        .login-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 25px;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .login-section h2 {
            color: #3498db;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .username-input {
            padding: 12px 18px;
            width: 320px;
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-right: 10px;
            outline: none;
            transition: border 0.3s;
        }

        .username-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: #2980b9;
        }

        /* 投票区域 */
        .vote-section {
            display: none; /* 默认隐藏，登录后显示 */
        }

        .candidate-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .candidate-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            background: #fff;
        }

        .candidate-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #3498db;
        }

        .candidate-card img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 18px;
            border: 4px solid #f1f1f1;
        }

        .candidate-card h3 {
            color: #2c3e50;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .candidate-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .vote-btn {
            background: #2ecc71;
            margin-top: 10px;
            padding: 10px 20px;
        }

        .vote-btn:hover {
            background: #27ae60;
        }

        .vote-btn.disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        /* 投票结果区域 */
        .result-section {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 2px solid #f1f1f1;
        }

        .result-section h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
            font-size: 20px;
        }

        .result-bar {
            height: 32px;
            background: linear-gradient(90deg, #3498db, #2980b9);
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-weight: bold;
            transition: width 0.8s ease;
            width: 0;
        }

        .result-item {
            margin-bottom: 20px;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
            color: #333;
        }

        /* 响应式适配 */
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }
            .username-input {
                width: 100%;
                margin-bottom: 15px;
            }
            .candidate-list {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>候选人投票系统</h1>

        <!-- 提示信息框 -->
        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <!-- 用户名登录区域 -->
        <div class="login-section" id="loginSection">
            <h2>请输入你的用户名</h2>
            <input type="text" class="username-input" id="usernameInput" placeholder="请输入用户名（如：张三123）" required>
            <button class="btn" id="loginBtn">进入投票</button>
        </div>

        <!-- 投票区域（登录后显示） -->
        <div class="vote-section" id="voteSection">
            <div class="candidate-list" id="candidateList">
                <!-- 候选人卡片由JS动态生成 -->
            </div>

            <!-- 投票结果区域 -->
            <div class="result-section">
                <h2>实时投票结果</h2>
                <div id="resultContainer">
                    <!-- 投票结果由JS动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心配置：后端API地址（和你的Node.js服务器完全对接）
        const API_BASE_URL = 'http://localhost:3000/api';
        
        // 全局变量
        let currentUser = "";
        let candidateData = [];

        // DOM元素获取
        const loginSection = document.getElementById('loginSection');
        const voteSection = document.getElementById('voteSection');
        const usernameInput = document.getElementById('usernameInput');
        const loginBtn = document.getElementById('loginBtn');
        const candidateList = document.getElementById('candidateList');
        const resultContainer = document.getElementById('resultContainer');
        const successAlert = document.getElementById('successAlert');
        const errorAlert = document.getElementById('errorAlert');

        // 初始化函数
        async function init() {
            // 绑定登录按钮事件
            loginBtn.addEventListener('click', handleLogin);
            // 加载候选人数据
            await loadCandidates();
            // 渲染投票结果
            renderResults();
        }

        // 1. 从后端加载候选人数据
        async function loadCandidates() {
            try {
                const response = await fetch(`${API_BASE_URL}/candidates`);
                const result = await response.json();
                
                if (result.code === 200) {
                    candidateData = result.data;
                    renderCandidates();
                } else {
                    showAlert('error', '获取候选人失败：' + result.message);
                }
            } catch (error) {
                showAlert('error', '连接后端失败，请检查服务器是否启动！');
                console.error('加载候选人失败：', error);
            }
        }

        // 2. 登录处理（检查是否已投票）
        async function handleLogin() {
            const username = usernameInput.value.trim();
            
            // 验证用户名
            if (!username) {
                showAlert('error', '请输入有效的用户名！');
                return;
            }
            
            // 调用后端接口检查投票状态
            try {
                const response = await fetch(`${API_BASE_URL}/check-vote`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    if (result.voted) {
                        showAlert('error', `用户名【${username}】已投过票，无法重复投票！`);
                    } else {
                        // 登录成功，显示投票区域
                        currentUser = username;
                        loginSection.style.display = 'none';
                        voteSection.style.display = 'block';
                        showAlert('success', `欢迎【${username}】，请为你支持的候选人投票！`);
                    }
                } else {
                    showAlert('error', result.message);
                }
            } catch (error) {
                showAlert('error', '检查投票状态失败，请检查后端服务！');
            }
        }

        // 3. 渲染候选人列表
        function renderCandidates() {
            candidateList.innerHTML = '';
            
            if (candidateData.length === 0) {
                candidateList.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">暂无候选人数据</div>';
                return;
            }
            
            candidateData.forEach(candidate => {
                const card = document.createElement('div');
                card.className = 'candidate-card';
                
                card.innerHTML = `
                    <img src="${candidate.img_url}" alt="${candidate.name}">
                    <h3>${candidate.name}</h3>
                    <p>当前票数：${candidate.votes}</p>
                    <button class="vote-btn btn" data-id="${candidate.id}">投TA一票</button>
                `;
                
                // 绑定投票按钮事件
                const voteBtn = card.querySelector('.vote-btn');
                voteBtn.addEventListener('click', () => handleVote(candidate.id));
                
                candidateList.appendChild(card);
            });
        }

        // 4. 提交投票（调用后端接口）
        async function handleVote(candidateId) {
            if (!currentUser) {
                showAlert('error', '请先输入用户名登录！');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/vote`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: currentUser,
                        candidateId: candidateId
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    showAlert('success', '投票成功！感谢你的参与。');
                    // 重新加载候选人数据（更新票数）
                    await loadCandidates();
                    renderResults();
                    
                    // 禁用所有投票按钮
                    document.querySelectorAll('.vote-btn').forEach(btn => {
                        btn.disabled = true;
                        btn.classList.add('disabled');
                        btn.textContent = '已投票';
                    });
                } else {
                    showAlert('error', result.message);
                }
            } catch (error) {
                showAlert('error', '投票失败，请检查后端服务！');
                console.error('投票提交失败：', error);
            }
        }

        // 5. 渲染投票结果进度条
        function renderResults() {
            resultContainer.innerHTML = '';
            
            if (candidateData.length === 0) {
                resultContainer.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">暂无投票数据</div>';
                return;
            }
            
            // 计算总票数
            const totalVotes = candidateData.reduce((sum, candidate) => sum + candidate.votes, 0);
            
            candidateData.forEach(candidate => {
                // 计算百分比
                const percentage = totalVotes > 0 ? ((candidate.votes / totalVotes) * 100).toFixed(1) : 0;
                const width = percentage + '%';
                
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                
                resultItem.innerHTML = `
                    <div class="result-label">
                        <span>${candidate.name}</span>
                        <span>${candidate.votes}票 (${percentage}%)</span>
                    </div>
                    <div class="result-bar" style="width: ${width}">${percentage}%</div>
                `;
                
                resultContainer.appendChild(resultItem);
            });
        }

        // 6. 提示信息显示函数
        function showAlert(type, message) {
            // 隐藏所有提示
            successAlert.style.display = 'none';
            errorAlert.style.display = 'none';
            
            // 显示对应提示
            const alertEl = type === 'success' ? successAlert : errorAlert;
            alertEl.textContent = message;
            alertEl.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                alertEl.style.display = 'none';
            }, 3000);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
